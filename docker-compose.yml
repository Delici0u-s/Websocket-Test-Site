services:
  backend:
    build: ./backend
    container_name: ws-demo-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1

  frontend:
    build:
      context: ./frontend
      args:
        # Empty on purpose: in production this is served behind nginx on
        # the same origin, so the client derives ws(s)://<host>/ws itself.
        # Override here only if frontend and backend live on different hosts.
        PUBLIC_WS_URL: ""
    container_name: ws-demo-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - backend

  # Optional: only needed if you want a single origin (so the browser
  # doesn't need CORS at all) and to terminate things the way your real
  # deployment (Cloudflare Tunnel + NPM) would. For plain local dev you
  # can skip this and hit frontend:3000 / backend:8000 directly.
  nginx:
    image: nginx:1.27-alpine
    container_name: ws-demo-nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend
