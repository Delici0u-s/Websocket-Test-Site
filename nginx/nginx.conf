# Single-origin reverse proxy: SvelteKit at /, FastAPI WS at /ws and /ws/debug.
# The Connection/Upgrade header forwarding here is the part that's easy to
# get wrong and silently breaks WebSockets (HTTP works fine, only the
# upgrade fails) - this is the same pattern you'd replicate in Nginx Proxy
# Manager's "Advanced" custom config field for a real deployment.

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name _;

    location /ws {
        proxy_pass http://backend:8000/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 3600s; # keep long-lived connections alive
    }

    location / {
        proxy_pass http://frontend:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
